apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: investigator-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_AUTH
              value: neo4j/$(NEO4J_PASSWORD)
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_memory_heap_max__size
              value: 512m
            - name: NEO4J_server_config_strict__validation_enabled
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: neo4j-pvc
