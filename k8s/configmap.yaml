apiVersion: v1
kind: ConfigMap
metadata:
  name: investigator-config
  namespace: investigator-ai
data:
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USERNAME: neo4j
  QDRANT_HOST: qdrant
  QDRANT_PORT: "6334"
  LANGFUSE_BASE_URL: http://langfuse:3000
  POSTGRES_URL: jdbc:postgresql://postgres:5432/investigator
  POSTGRES_USER: investigator
  # MLX servers run on the macOS host. host.minikube.internal resolves to the host inside Minikube.
  MLX_BASE_URL: http://host.minikube.internal:8081/v1
  MLX_MODEL_ID: mlx-community/Qwen3.6-35B-A3B-4bit
  EMBED_BASE_URL: http://host.minikube.internal:8082/v1
  EMBED_MODEL_ID: mlx-community/nomicai-modernbert-embed-base-bf16
