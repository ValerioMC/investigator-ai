apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: investigator-api
  namespace: investigator-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: investigator-ai.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
