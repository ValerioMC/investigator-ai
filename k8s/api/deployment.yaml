apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigator-api
  namespace: investigator-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investigator-api
  template:
    metadata:
      labels:
        app: investigator-api
    spec:
      containers:
        - name: investigator-api
          image: investigator-ai:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: investigator-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: NEO4J_PASSWORD
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_SECRET_KEY
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
