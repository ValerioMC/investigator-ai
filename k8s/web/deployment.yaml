apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigator-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: investigator-web
  template:
    metadata:
      labels:
        app: investigator-web
    spec:
      containers:
        - name: investigator-web
          image: investigator-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: investigator-config
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: NEO4J_PASSWORD
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/investigator
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_SECRET_KEY
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
