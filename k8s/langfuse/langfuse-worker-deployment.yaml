apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-worker
  namespace: investigator-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-worker
  template:
    metadata:
      labels:
        app: langfuse-worker
    spec:
      containers:
        - name: langfuse-worker
          image: langfuse/langfuse-worker:3.175.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_SALT
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_ENCRYPTION_KEY
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_NEXTAUTH_SECRET
            - name: CLICKHOUSE_MIGRATION_URL
              value: clickhouse://langfuse:langfuse@langfuse-clickhouse:9000
            - name: CLICKHOUSE_URL
              value: http://langfuse-clickhouse:8123
            - name: CLICKHOUSE_USER
              value: langfuse
            - name: CLICKHOUSE_PASSWORD
              value: langfuse
            - name: REDIS_CONNECTION_STRING
              value: redis://:@langfuse-redis:6379
            # S3-compatible event storage (MinIO)
            - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
              value: langfuse-events
            - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
              value: us-east-1
            - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
              value: minio
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              value: minio123
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: http://langfuse-minio:9000
            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: langfuse-events
            - name: LANGFUSE_S3_MEDIA_UPLOAD_REGION
              value: us-east-1
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID
              value: minio
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              value: minio123
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: http://langfuse-minio:9000
            - name: LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: TELEMETRY_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3030
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
