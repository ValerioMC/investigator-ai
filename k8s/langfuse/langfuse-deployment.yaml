apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: investigator-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: http://langfuse:3000
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_SALT
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: HOSTNAME
              value: "0.0.0.0"
            # Auto-provision org/project/admin on first start so make up is ready to use
            - name: LANGFUSE_INIT_ORG_NAME
              value: "InvestigatorAI"
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: "investigator-ai"
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_SECRET_KEY
            - name: LANGFUSE_INIT_USER_EMAIL
              value: "admin@investigator-ai.local"
            - name: LANGFUSE_INIT_USER_PASSWORD
              value: "investigator"
            - name: LANGFUSE_INIT_USER_NAME
              value: "Admin"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
