apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: investigator-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: http://langfuse:3000
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: investigator-secrets
                  key: LANGFUSE_SALT
            - name: TELEMETRY_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
