spring.application.name=investigator-web
server.port=8090
spring.threads.virtual.enabled=true

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.visibility.field=ANY

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/investigator}
spring.datasource.username=${POSTGRES_USER:investigator}
spring.datasource.password=${POSTGRES_PASSWORD:investigator}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Neo4j
neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
neo4j.authentication.password=${NEO4J_PASSWORD:investigator}

# Qdrant
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6333}
qdrant.default-collection=documents
qdrant.embedding-model=nomic-embed-text
qdrant.ollama-base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Ollama LLM
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model-id=qwen3.6:35b
ollama.temperature=0.6
ollama.num-ctx=32768
ollama.num-predict=4096
ollama.timeout-seconds=600

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true

# CORS
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:8090
