# These values are overridden by investigator-api/application.properties at runtime.
# Defined here so the agents module can be tested in isolation.

quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-id=qwen3.6:35b
quarkus.langchain4j.ollama.chat-model.temperature=0.6
quarkus.langchain4j.ollama.chat-model.top-p=0.95
quarkus.langchain4j.ollama.chat-model.num-predict=4096
quarkus.langchain4j.ollama.chat-model.num-ctx=32768
quarkus.langchain4j.ollama.timeout=600s

quarkus.langchain4j.observability.langfuse.enabled=${LANGFUSE_ENABLED:false}
quarkus.langchain4j.observability.langfuse.base-url=${LANGFUSE_BASE_URL:http://localhost:3000}
quarkus.langchain4j.observability.langfuse.public-key=${LANGFUSE_PUBLIC_KEY:}
quarkus.langchain4j.observability.langfuse.secret-key=${LANGFUSE_SECRET_KEY:}
