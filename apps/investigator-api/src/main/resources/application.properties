spring.application.name=investigator-api
server.port=8080
spring.threads.virtual.enabled=true

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE

# Neo4j (Spring Data Neo4j autoconfig)
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:investigator}

# Qdrant + embedding server (mlx-embeddings FastAPI, OpenAI-compatible)
qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6333}
qdrant.default-collection=documents
qdrant.embedding-model=${EMBED_MODEL_ID:mlx-community/nomicai-modernbert-embed-base-bf16}
qdrant.embedding-base-url=${EMBED_BASE_URL:http://host.minikube.internal:8082/v1}

# LLM: MLX server (mlx_lm.server) OpenAI-compatible. Da pod K8s usa host.minikube.internal
mlx.base-url=${MLX_BASE_URL:http://host.minikube.internal:8081/v1}
mlx.model-id=${MLX_MODEL_ID:mlx-community/Qwen3.6-35B-A3B-4bit}
mlx.temperature=0.2
mlx.max-tokens=4096
mlx.timeout-seconds=600

# Langfuse tracing
langfuse.enabled=${LANGFUSE_ENABLED:true}
langfuse.base-url=${LANGFUSE_BASE_URL:http://localhost:3000}
langfuse.public-key=${LANGFUSE_PUBLIC_KEY:}
langfuse.secret-key=${LANGFUSE_SECRET_KEY:}

# Logging
logging.level.root=INFO
logging.level.ai.investigator=DEBUG
logging.level.dev.langchain4j=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true
